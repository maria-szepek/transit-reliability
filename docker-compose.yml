  #   command: >
  #     bash -c "
  #     echo 'Waiting for Flink cluster...' &&
  #     sleep 15 &&
  #     flink run -py /opt/flink/usrlib/job.py
  #     "
  #   restart: unless-stopped

  flink-submit:
    build:
      context: ./services/flink
      dockerfile: Dockerfile.flink
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
    volumes:
      - ./services/flink:/opt/flink/usrlib
    command: >
      bash -c "
      echo 'Submitting Flink job...' &&
      flink run -py /opt/flink/usrlib/job.py
      "
    restart: unless-stopped
  


volumes:
  postgres_data:
  pgadmin_data:

