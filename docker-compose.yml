services:

  postgres:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    shm_size: 2gb # i added this because for analytics otherwise the memory was too small and crashed

  pgadmin:
    image: dpage/pgadmin4
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8085:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  init-kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - kafka
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "
      # blocks until kafka is reachable
      echo 'Waiting for Kafka...'
      kafka-topics --bootstrap-server kafka:9092 --list

      echo -e 'Creating kafka topics'
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic gtfs.trip_updates --replication-factor 1 --partitions 1

      echo -e 'Successfully created the following topics:'
      kafka-topics --bootstrap-server kafka:9092 --list
      "

  realtime-gtfs-producer:
    build:
      context: ./services/ingestion
    command: python -u -m realtime.gtfs_realtime_producer
    depends_on:
      - kafka
    env_file:
      - .env
    restart: unless-stopped


  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - otp
      - kafka
    ports:
      - "8000:8000"

  otp:
    image: opentripplanner/opentripplanner:2.5.0
    ports:
      - "8088:8080"
    volumes:
      - ./data:/var/opentripplanner
    command: >
      --build --serve

  flink-jobmanager:
    build:
      context: ./services/flink
      dockerfile: Dockerfile.flink
    ports:
      - "8081:8081"
    volumes:
      - ./services/flink:/opt/flink/usrlib
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 5s
      timeout: 3s
      retries: 20

  flink-taskmanager:
    build:
      context: ./services/flink
      dockerfile: Dockerfile.flink
    volumes:
      - ./services/flink:/opt/flink/usrlib
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 15
        parallelism.default: 3

  flink-submit:
    build:
      context: ./services/flink
      dockerfile: Dockerfile.flink
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
    volumes:
      - ./services/flink:/opt/flink/usrlib
    command: >
      bash -c "
      echo 'Submitting Flink job...' &&
      flink run -m flink-jobmanager:8081 -py /opt/flink/usrlib/job.py
      "
  
volumes:
  postgres_data:
  pgadmin_data:
