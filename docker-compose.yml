  flink-jobmanager:
    build:
      context: ./services/flink
      dockerfile: Dockerfile.flink
    ports:
      - "8081:8081"
    volumes:
      - ./services/flink:/opt/flink/usrlib
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 5s
      timeout: 3s
      retries: 20

  flink-taskmanager:
    build:
      context: ./services/flink
      dockerfile: Dockerfile.flink
    volumes:
      - ./services/flink:/opt/flink/usrlib
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 15
        parallelism.default: 3

  # flink-submit:
  #   build:
  #     context: ./services/flink
  #     dockerfile: Dockerfile.flink
  #   depends_on:
  #     - flink-jobmanager
  #     - flink-taskmanager
  #   volumes:
