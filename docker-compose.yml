  realtime-gtfs-producer:
    build:
      context: ./services/ingestion
    command: python -u -m realtime.gtfs_realtime_producer
    depends_on:
      - kafka
    env_file:
      - .env
    restart: unless-stopped

  realtime-gtfs-consumer:
    build:
      context: ./services/ingestion
    command: python -u -m realtime.gtfs_realtime_consumer
    depends_on:
      - kafka
      - postgres
    env_file:
      - .env
    restart: unless-stopped

